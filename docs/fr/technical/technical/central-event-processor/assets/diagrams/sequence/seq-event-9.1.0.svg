    <text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="400.2705" x="184" y="580.4106">Le « type » serait une énumération (ENUM) avec les valeurs :</text>
    <text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.1206" x="200.5293" y="595.5435">[INFO, DEBUG, ERROR, WARN, FATAL, TRACE]</text>
