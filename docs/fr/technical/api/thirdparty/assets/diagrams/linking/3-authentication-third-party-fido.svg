    <path d="M54,143.7109 L54,183.7109 L1043,183.7109 L1043,153.7109 L1033,143.7109 L54,143.7109 " fill="#FAFAFA" style="stroke:#181818;stroke-width:0.5;"/>
    <path d="M1033,143.7109 L1033,153.7109 L1043,153.7109 L1033,143.7109 " fill="#FAFAFA" style="stroke:#181818;stroke-width:0.5;"/>
    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="498.5322" x="60" y="160.7778">Ici, l&apos;utilisateur suit le processus d&apos;authentification Web auprès de son DFSP.</text>
    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="968.7031" x="60" y="175.9106">Il en résulte une redirection vers le PISP avec un paramètre d&apos;URL particulier indiquant au PISP d&apos;attendre une notification concernant un identifiant.</text>
    <path d="M5,221.9766 L5,276.9766 L1094,276.9766 L1094,231.9766 L1084,221.9766 L5,221.9766 " fill="#FAFAFA" style="stroke:#181818;stroke-width:0.5;"/>
    <path d="M1084,221.9766 L1084,231.9766 L1094,231.9766 L1084,221.9766 " fill="#FAFAFA" style="stroke:#181818;stroke-width:0.5;"/>
    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="1068.5898" x="11" y="239.0435">À ce stade, le DFSP considère que l&apos;utilisateur est son client et que l&apos;utilisateur fait confiance au PISP. Le DFSP peut donc poursuivre en accordant le consentement.</text>
    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="11" y="254.1763"> </text>
    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="951.3423" x="11" y="269.3091">Note : le DFSP ne « répond » jamais directement à la demande de consentement. Il créera plutôt une ressource Consent lors de la phase d&apos;octroi.</text>
  </g>
</svg>
