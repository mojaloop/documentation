    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="1068.5898" x="74.4058" y="533.9028">À ce stade, le DFSP considère que l&apos;utilisateur est son client et que l&apos;utilisateur fait confiance au PISP. Le DFSP peut donc poursuivre en accordant le consentement.</text>
    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="4.1323" x="74.4058" y="549.0356"> </text>
    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="951.3423" x="74.4058" y="564.1685">Note : le DFSP ne « répond » jamais directement à la demande de consentement. Il créera plutôt une ressource Consent lors de la phase d&apos;octroi.</text>
