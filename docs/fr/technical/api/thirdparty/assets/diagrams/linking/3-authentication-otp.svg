    <text fill="#000000" font-family="Verdana" font-size="13" lengthAdjust="spacing" textLength="1197.8662" x="11" y="160.7778">Ici, l&apos;utilisateur saisit l&apos;OTP qui lui a été envoyé directement par le DFSP dans l&apos;application PISP. Il est utilisé comme secret pour prouver au DFSP que l&apos;utilisateur fait confiance au PISP.</text>
